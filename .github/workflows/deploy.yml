name: Netara

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  sast:
    name: SAST
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # J'ai passé semgrep en javascript (vu que tu n'as probablement plus de TypeScript)
      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/javascript

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Uniformisé sur la version 24 partout
          cache: npm

      - name: Install
        run: npm install

      - name: Audit dépendances
        run: npm audit --audit-level=critical

      # Si tu n'utilises plus ESLint, tu peux supprimer cette étape
      - name: Lint
        run: npm run lint --if-present 

  build:
    name: Build (Tailwind)
    runs-on: ubuntu-22.04
    needs: sast
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm install

      # Va exécuter ta commande Tailwind pour générer public/css/style.css
      - name: Build CSS
        run: npm run build:css

      # On prépare un dossier propre avec uniquement ce dont Hostinger a besoin
      - name: Prepare Artifact
        run: |
          mkdir production_build
          cp -r public api server.js package.json package-lock.json production_build/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: production_build/

  post-build:
    name: Post-build
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: app-build/

      # Vérification de ta nouvelle architecture
      - name: Vérification structure build
        run: |
          test -f app-build/server.js && echo "✅ Serveur présent"
          test -d app-build/api && echo "✅ Dossier API présent"
          test -f app-build/public/css/style.css && echo "✅ CSS Tailwind compilé présent"

      - name: Taille de l'application
        run: |
          echo "📦 Taille du projet final :"
          du -sh app-build/

  deploy-preview:
    name: Deploy Preview (Frontend Only)
    runs-on: ubuntu-22.04
    needs: build
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: app-build/

      # On ne déploie QUE le dossier public sur GitHub Pages
      - name: Deploy Frontend to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app-build/public